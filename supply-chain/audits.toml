# cargo-vet audits — 본 repo 자체가 수행한 crate audit 기록.
#
# 형식:
#   [[audits.<crate-name>]]
#   who      = "<email>"
#   version  = "<semver>"
#   criteria = "safe-to-deploy" | "safe-to-run"
#   notes    = "검토 근거"
#
# Trust base: Google / Mozilla / Bytecode Alliance audit 은
# `supply-chain/config.toml` 의 `[imports.*]` 를 통해 자동 merge — 본 파일에는
# 본 repo 가 직접 검토한 audit 만 기록한다.
#
# 사용:
#   cargo install --locked cargo-vet
#   cargo vet                    # audit status check
#   cargo vet diff X 0.1 0.2     # version diff review (수동 검토용)
#   cargo vet certify <crate>    # 새 audit entry 추가 (interactive)
#
# 본 repo 가 직접 audit 한 5건 (crypto-critical primitives). 모두 spec
# §14.9.1 §§1-§§5 envelope encryption + §12.4 chain_tip_signature 경로의
# 핵심 의존성 — runtime binary 에 항상 포함되므로 `safe-to-deploy`.
#
# ── Tiered audit policy ───────────────────────────────────────────────────
# 본 repo 의 `cargo vet check` 적용 정책은 layered:
#
#   1. **Hard fail tier (release-blocker)** — 본 파일에 entry 가 있는 5
#      crypto-critical crate. wire format / 기밀성 직결, 매 release 마다
#      prune + audit 의무.
#   2. **Advisory tier (CI warning, not fail)** — 그 외 transitive dep
#      (~50건). `[exemptions]` 에 남아 있어도 alpha 기간 release-blocker
#      아님. CI `supply-chain` job 의 `cargo vet check` step 이
#      `|| echo ::warning::` 로 wrap 되어 advisory 로만 surface.
#
# Single-rule (전부 hard fail) 거부 근거: 1인 maintainer 가 매 release 마다
# transitive 50건 prune+audit 은 비현실적. v0.11 alpha freeze + asymptotic
# version 정책과 정합. v1.0 영구 미도달 directive 하에서도 **release stage
# 안정화 시점** (예: v0.50+) 에 advisory → hard fail 격상 검토.
#
# Trust base import (Google / Mozilla / Bytecode Alliance) 가 transitive
# 대부분을 자동 흡수. 본 파일 audit 은 import 가 커버하지 않는 5건.

[[audits.ed25519-dalek]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "2.2.0"
criteria = "safe-to-deploy"
notes    = """
Spec §12.4 chain_tip_signature + §14.7 SignatureClassPolicy + release-keys §3
의 핵심 signing primitive. v2.0+ 부터 `subtle` constant-time 비교 +
`zeroize` 통합. CVE-2022-46396 (timing oracle) 는 v2.0 에서 closed.
RustSec audit DB clean. Source review 결과 panic-free + no unsafe in hot
path (FFI 없음).
"""

[[audits.blake3]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "1.8.4"
criteria = "safe-to-deploy"
notes    = """
Spec §3.2 verb-allocation domain separator + §12.4 chain_tip_hash +
§14.9.1 §§4 body_hash 의 cryptographic hash primitive. BLAKE3 team (J.
