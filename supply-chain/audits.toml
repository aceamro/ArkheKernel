"""

[[audits.aes-gcm]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "0.10.3"
criteria = "safe-to-deploy"
notes    = """
Spec §14.9.1 §§3 AeadKind::Aes256Gcm 의 hardware-accelerated AEAD. RustCrypto
