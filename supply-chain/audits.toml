"""

[[audits.chacha20poly1305]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "0.10.1"
criteria = "safe-to-deploy"
notes    = """
Spec §14.9.1 §§3 AeadKind::XChaCha20Poly1305 (default) 의 misuse-resistant
