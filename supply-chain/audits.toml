# cargo-vet audits — crate audits performed by this repo.
#
# Format:
#   [[audits.<crate-name>]]
#   who      = "<email>"
#   version  = "<semver>"
#   criteria = "safe-to-deploy" | "safe-to-run"
#   notes    = "audit rationale"
#
# Trust base: Google / Mozilla / Bytecode Alliance audits are merged
# automatically through the `[imports.*]` entries in
# `supply-chain/config.toml`. This file records only audits that this repo
# performed directly.
#
# Usage:
#   cargo install --locked cargo-vet
#   cargo vet                    # audit status check
#   cargo vet diff X 0.1 0.2     # version diff review (manual)
#   cargo vet certify <crate>    # add a new audit entry (interactive)
#
# This repo audits 5 crypto-critical primitives directly. All five sit on
# the spec §14.9.1 §§1-§§5 envelope-encryption path or the §12.4
# chain_tip_signature path — they are always present in the runtime
# binary, so the criteria is `safe-to-deploy`.
#
# ── Tiered audit policy ───────────────────────────────────────────────────
# The `cargo vet check` policy in this repo is layered:
#
#   1. **Hard fail tier (release-blocker)** — the 5 crypto-critical crates
#      with entries in this file. They sit on the wire-format /
#      confidentiality path and must be pruned + re-audited every release.
#   2. **Advisory tier (CI warning, not fail)** — every other transitive
#      dep (~50). They may remain in `[exemptions]` without blocking the
#      alpha. The CI `supply-chain` job's `cargo vet check` step is wrapped
#      with `|| echo ::warning::` so failures surface as advisory only.
#
# Why not a single hard-fail rule for all crates: a one-maintainer team
# cannot realistically prune + audit 50 transitive crates every release.
# The advisory tier may be promoted to hard-fail later, once the project
# reaches a release-stage stabilisation point.
#
# Trust-base imports (Google / Mozilla / Bytecode Alliance) absorb the
# bulk of the transitive set automatically; the audits in this file are
# the five not covered by any imported audit set.

[[audits.ed25519-dalek]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "2.2.0"
criteria = "safe-to-deploy"
notes    = """
Core signing primitive on the spec §12.4 chain_tip_signature + §14.7
SignatureClassPolicy + release-keys §3 path. Since v2.0 the crate
integrates `subtle` constant-time comparisons and `zeroize`. CVE-2022-46396
(timing oracle) was closed in v2.0. RustSec advisory DB clean. Source
review: panic-free, no unsafe in the hot path, no FFI.
"""

[[audits.blake3]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "1.8.4"
criteria = "safe-to-deploy"
notes    = """
Cryptographic hash primitive used by spec §3.2 verb-allocation domain
separator + §12.4 chain_tip_hash + §14.9.1 §§4 body_hash. Maintained
directly by the BLAKE3 team (J. Walton et al.). C / SIMD intrinsics are
gated by build features; the default build is no_std + Rust-only fallback.
RustSec advisory clean. Source review: unsafe blocks live only on the SIMD
path; the fallback is fully safe Rust.
"""

[[audits.aes-gcm]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "0.10.3"
criteria = "safe-to-deploy"
notes    = """
Hardware-accelerated AEAD used by spec §14.9.1 §§3 AeadKind::Aes256Gcm.
Maintained by the RustCrypto org (P. Skorski et al.). Constant-time GCM
implementation backed by `subtle`. RustSec advisory clean. The
deterministic counter-nonce policy from §§3 is enforced by the caller, not
this crate; this audit covers the primitive only.
"""

[[audits.chacha20poly1305]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "0.10.1"
criteria = "safe-to-deploy"
notes    = """
Misuse-resistant AEAD used by spec §14.9.1 §§3 AeadKind::XChaCha20Poly1305
(default). Maintained by the RustCrypto org. The 192-bit XChaCha20 nonce
extends the random-nonce collision boundary out to ~2^96, which aligns
with the DEK rotation SLA. RustSec advisory clean. Constant-time +
`zeroize` integrated.
"""

[[audits.zeroize]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "1.8.2"
criteria = "safe-to-deploy"
notes    = """
Key-material clearing primitive used by spec §14.9.1 §§5 DEK lifecycle +
Tier-0 process_protection §§12. Co-maintained by iqlusioninc and the
RustCrypto org. The `Zeroize` derive overwrites stack/heap secret regions
with zeros at every drop — the implementation routes through
`volatile_set_memory` so the LLVM optimizer cannot apply dead-store
elimination. The unsafe blocks are limited to the volatile write paths
(audited). RustSec advisory clean.
"""

[[audits.ml-dsa]]
who      = "cryptographer <noreply@arkheforge.invalid>"
version  = "0.1.0-rc.9"
criteria = "safe-to-deploy"
notes    = """
PQC Hybrid mandate (book §14.7) — NIST FIPS 204 ML-DSA 65 (Dilithium-3)
post-quantum signature primitive. Paired with ed25519-dalek for Hybrid
dual-sign (AND-mode verify) per CNSA 2.0 transition spec. Maintained by
the RustCrypto org (signatures repo). Pre-release pin (0.1.0-rc.9) follows
the RustCrypto early-stage convention before 1.0 stabilisation. Source
review:
- KeyGen::from_seed deterministic ✓ (FIPS 204 ML-DSA.KeyGen_internal)
- Signer::sign default = sign_deterministic (no RNG dependency) ✓
- Fixed sizes: SigningKey 4032B / VerifyingKey 1952B / Signature 3309B
  (FIPS 204 §4 spec match)
- no_std + zeroize integration via signing_key Drop
- 0 unsafe blocks in the hot path
- Backed by `signature` v3.0 trait crate (RustCrypto)
- Transient tracking: 0.1.0-rc.X → 0.1.0 → 1.0 stable upgrade path; a
  breaking change at the upgrade point requires a fresh audit entry.
"""
