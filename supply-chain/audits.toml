"""

[[audits.zeroize]]
who      = "veteran <noreply@arkheforge.invalid>"
version  = "1.8.2"
criteria = "safe-to-deploy"
notes    = """
Spec §14.9.1 §§5 DEK lifecycle + Tier-0 process_protection §§12 의 key
material clearing primitive. iqlusioninc / RustCrypto 공동 maintain.
`Zeroize` derive 는 매 drop 마다 stack/heap secret 영역을 0 으로 overwrite —
LLVM optimizer 가 dead-store elimination 하지 않도록 `volatile_set_memory`
경로 사용. unsafe 블록은 volatile write 만, audited. RustSec advisory clean.
"""

[[audits.ml-dsa]]
who      = "cryptographer <noreply@arkheforge.invalid>"
version  = "0.1.0-rc.9"
criteria = "safe-to-deploy"
notes    = """
v0.12 PQC Hybrid mandate (book §14.7) — NIST FIPS 204 ML-DSA 65 (Dilithium-3)
post-quantum signature primitive. Paired with ed25519-dalek for Hybrid
dual-sign (AND-mode verify) per CNSA 2.0 transition spec. RustCrypto org
maintain (signatures repo). Pre-release pin (0.1.0-rc.9) — RustCrypto
early-stage convention pre-1.0 stabilization. Source review:
- KeyGen::from_seed deterministic ✓ (FIPS 204 ML-DSA.KeyGen_internal)
- Signer::sign default = sign_deterministic (no RNG dependency) ✓
- Fixed sizes: SigningKey 4032B / VerifyingKey 1952B / Signature 3309B
  (FIPS 204 §4 spec match)
- no_std + zeroize integration via signing_key Drop
- unsafe block 0 in hot path
- Backed by `signature` v3.0 trait crate (RustCrypto)
- Transient tracking: 0.1.0-rc.X → 0.1.0 → 1.0 stable upgrade path; breaking
  시 별 micro-cycle (V99-8.1) 진입.
"""
