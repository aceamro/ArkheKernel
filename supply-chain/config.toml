# cargo-vet config — supply-chain transitive dependency approval chain.
#
# Usage:
#   cargo install cargo-vet
#   cargo vet init                     # one-time
#   cargo vet                          # fetch crates.io and check approvals
#   cargo vet diff <crate> <old> <new> # review a version diff
#
# Trust base: Google / Mozilla / Bytecode Alliance audit imports.
# Each runtime crate carries an explicit criteria.

[cargo-vet]
version = "0.10"

# Criteria definitions — runtime defaults.
# `safe-to-deploy`: may be linked into a production binary.
# `safe-to-run`: test / build-script use only.
[[criteria.safe-to-deploy]]
description = "Linkable into a production binary. No RCE or supply-chain backdoor."

[[criteria.safe-to-run]]
description = "Runs in build / test environments only. Must not enter the binary."

# External audit imports — three trust bases.
[imports.google]
url = "https://raw.githubusercontent.com/google/rust-crate-audits/main/audits.toml"

[imports.mozilla]
url = "https://hg.mozilla.org/mozilla-central/raw-file/tip/supply-chain/audits.toml"

[imports.bytecode-alliance]
url = "https://raw.githubusercontent.com/bytecodealliance/wasmtime/main/supply-chain/audits.toml"

# Per-workspace-crate criteria.
[policy.arkhe-kernel]
criteria = "safe-to-deploy"

[policy.arkhe-macros]
criteria = "safe-to-deploy"

# Domain demo is test-only.
[policy.dice]
criteria = "safe-to-run"

# ── Exemptions ─────────────────────────────────────────────────────────────
# Initially empty. The first run of `cargo vet init` scans the workspace
# dependencies and adds entries for every crate that has not yet been
# audited. Each exemption uses this format:
#
#   [[exemptions.<crate-name>]]
#   version = "1.2.3"
#   criteria = "safe-to-deploy"
#   notes = "<reason audit is incomplete + planned audit path>"
#
# Goal: drive the exemption count to 0 before release (every crate either
# directly audited here or absorbed by an imported trust base). This is
# the path to a green cargo-vet / cargo-audit gate at release time.
#
# Operating procedure:
#   cargo install cargo-vet
#   cargo vet init                     # one-time — populates exemptions
#   cargo vet                          # check audit status
#   cargo vet diff <crate> <old> <new> # review a version diff
#   cargo vet prune                    # remove unused exemption entries

[exemptions]
# (empty — populated after `cargo vet init` runs)
