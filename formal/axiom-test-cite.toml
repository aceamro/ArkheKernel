# ----- E13: SignatureClassPolicy chain-anchored + sticky-Hybrid -----
[E13]
tier = "MC"
axiom = "Shell [audit.signature_class] chain-anchored via SignatureClassPolicy; sticky-Hybrid (post-Hybrid Ed25519 receipts rejected)"
spec_section = "§11.4 / §14.7 FG5 / §14.11"
tla_module = "formal/tla-plus/cr3_replay_determinism.tla"
# E13-1, E13-2, E13-3 INVs. HybridDualSignBoth is the positive AND-mode form
# (sibling of the attack-form NoPqcDowngradeAttack); both are required so that
# the inventory faithfully reflects all three INVs declared in cr3.tla.
tla_invs = [
    "NoSignatureDowngradeAfterPolicy",
    "NoPqcDowngradeAttack",
    "HybridDualSignBoth",
]
tla_theorem = "PolicyMonotonic_Derivable"
# Documentation-only references (verify-axiom-cite.sh does not check these field names;
# informational anchors for narrative cross-ref to spec body §14.11 sticky-Hybrid).
tla_helpers = ["ShellPolicySnapshot", "ShellPolicySnapshotAtTick"]
tla_event_types = ["SignatureClassPolicyEvent", "AuditReceipt"]
tla_transitions = ["DeclareSignatureClassPolicy"]
impl_tests = [
    # NoPqcDowngradeAttack (E13-2) — downgrade rejection on AND-mode envelope
    "hybrid_verify_chain_rejects_missing_pqc",
    "pqc_without_ed25519_envelope_rejected",
    # HybridDualSignBoth (E13-3) — positive + corruption rejection on each leg
    "hybrid_verify_chain_and_mode_passes_with_both_valid",
    "hybrid_verify_chain_rejects_corrupt_pqc_signature",
    "hybrid_verify_chain_rejects_corrupt_ed25519_when_pqc_valid",
    # SignatureClass enum surface + sticky-Hybrid envelope construction
    "signature_class_none_produces_no_signature",
    "signature_class_ed25519_signs_each_record",
    "hybrid_signature_class_construct",
    "hybrid_writer_emits_both_signatures",
    "ed25519_only_wal_replays_under_hybrid_kernel",
    # WAL byte-shape pinning of Hybrid layout (NoPqcDowngradeAttack byte-anchor)
    "wal_record_hybrid_layout_byte_identity",
    "wal_header_verifying_key_pqc_slot_pinned",
    # PqcSigner / PqcVerifier sealed-trait witnesses + ML-DSA 65 byte-shape
    "pqc_signer_trait_software_witness",
    "pqc_verifier_trait_software_witness",
    "ml_dsa_65_software_signer_round_trip",
    "ml_dsa_65_signature_size_3309_bytes",
    "ml_dsa_65_verifying_key_size_1952_bytes",
]
impl_paths = [
    "arkhe-kernel/src/persist/wal.rs",
    "arkhe-kernel/src/persist/signature.rs",
    "arkhe-kernel/src/persist/mod.rs",
    "arkhe-kernel/src/runtime/kernel.rs",
    "arkhe-kernel/src/lib.rs",
]
note = "Hybrid AND-mode dispatch (Ed25519 + ML-DSA 65 both must pass), no-downgrade tests, and PqcSigner/PqcVerifier sealed-trait witnesses are kernel-side. Byte-shape pinning (3309/1952) is the NoPqcDowngradeAttack anchor at the wire layer. Wire-format byte-pinning attack-vector anchors (truncated header / zeroed PQC slot / wrong-size record) hosted under E14_L2_Allow as Layer A item 8 — wal_record_hybrid_layout_byte_identity + wal_header_verifying_key_pqc_slot_pinned (cross-axiom placement, structural prerequisite for E13 semantic INVs)."

# E13 specification ↔ implementation alignment notes — explicit so external readers
# can see where the abstract model and the materialized impl diverge by design and
# how the equivalent guarantee is carried through other axes (WAL byte-format +
# Hybrid AND-mode dispatch path).
[E13.coverage_notes]
policy_events_design = "Specification models per-shell `Seq(SignatureClassPolicyEvent)` chain-anchored via the DeclareSignatureClassPolicy transition. The impl materializes SignatureClass at the WAL-writer level (per-Kernel config) rather than as a per-shell tick-stamped event log. This is by design: the WAL byte-format invariants (E14_L2_Allow) and the Hybrid AND-mode dispatch path carry the equivalent integrity guarantee at the wire layer."
e13_1_coverage = "NoSignatureDowngradeAfterPolicy (E13-1) is a specification-level INV. Coverage at the impl flows through the WAL byte-format invariants (E14_L2_Allow — wal_record_hybrid_layout_byte_identity + wal_header_verifying_key_pqc_slot_pinned) and the kani_hybrid_and_mode_property anchor, since the impl's chain-anchoring of SignatureClass happens at the WAL-writer level rather than via an abstract policy-event transition."
policy_monotonic_derivation = "PolicyMonotonic_Derivable is a THEOREM (derivable from A14 append-only + integer monotonicity), not an INV — no model-checking trace and no impl unit-test are required by construction."
pqc_visibility = "PQC surface is anchored across 9+ kernel files / 14+ test fns: MlDsa / Hybrid / pqc_* references span signature.rs, wal.rs, runtime/kernel.rs. Hybrid AND-mode is implemented and tested at the WAL-writer level. The specification-side per-shell policy_events log is the abstraction model; the impl carries the equivalent guarantee via the WAL byte-format + Hybrid AND-mode dispatch path."

